<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Kütüphane</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .auth-container { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; padding: 20px; }
        .auth-card { width: 350px; padding: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border-radius: 12px; background: white; }
        .btn-primary { background-color: #2c3e50; border: none; }
        .btn-primary:hover { background-color: #34495e; }
    </style>
</head>
<body>

<div class="auth-container">
    <div class="auth-card">
        <h4 class="text-center mb-4">Kayıt Ol</h4>
        <div class="mb-3">
            <input type="text" id="regName" class="form-control" placeholder="Ad">
        </div>
        <div class="mb-3">
            <input type="text" id="regLastName" class="form-control" placeholder="Soyad">
        </div>
        <div class="mb-3">
            <input type="email" id="regMail" class="form-control" placeholder="E-posta">
        </div>
        <div class="mb-3">
            <input type="password" id="regPassword" class="form-control" placeholder="Şifre">
        </div>
        <button onclick="register()" class="btn btn-primary w-100">Hesap Oluştur</button>
        <div id="regMessage" class="mt-2 small text-center"></div>
    </div>

    <div class="auth-card">
        <h4 class="text-center mb-4">Giriş Yap</h4>
        <div class="mb-3">
            <input type="email" id="logMail" class="form-control" placeholder="E-posta">
        </div>
        <div class="mb-3">
            <input type="password" id="logPassword" class="form-control" placeholder="Şifre">
        </div>
        <button onclick="login()" class="btn btn-success w-100">Giriş Yap</button>
        <div id="logMessage" class="mt-2 small text-center"></div>
    </div>
</div>

<script>
    const API_URL = '/api/Users';

    
    async function register() {
        const user = {
            name: document.getElementById('regName').value,
            lastName: document.getElementById('regLastName').value,
            mail: document.getElementById('regMail').value,
            password: document.getElementById('regPassword').value
        };

        try {
            const response = await fetch(`${API_URL}/register`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(user)
            });

            if (response.ok) {
                document.getElementById('regMessage').innerHTML = '<span class="text-success">Kayıt başarılı! Şimdi giriş yapabilirsiniz.</span>';
            } else {
                const err = await response.text();
                document.getElementById('regMessage').innerHTML = `<span class="text-danger">${err}</span>`;
            }
        } catch (e) {
            console.error(e);
        }
    }

    
    async function login() {
        const credentials = {
            mail: document.getElementById('logMail').value,
            password: document.getElementById('logPassword').value
        };

        try {
            const response = await fetch(`${API_URL}/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(credentials)
            });

            const data = await response.json();

            if (response.ok) {
                localStorage.setItem('token', data.token);
                document.getElementById('logMessage').innerHTML = `<span class="text-success">Hoş geldin ${data.user}!</span>`;
                
            } else {
                document.getElementById('logMessage').innerHTML = `<span class="text-danger">Giriş başarısız!</span>`;
            }
        } catch (e) {
            console.error(e);
        }
    }
</script>

</body>
</html>
